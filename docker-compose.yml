services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: idle-game-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: idle-game-backend
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: idle_game
      DB_USER: idle_user
      DB_PASSWORD: idle_password
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: idle-game-db
    environment:
      POSTGRES_DB: idle_game
      POSTGRES_USER: idle_user
      POSTGRES_PASSWORD: idle_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idle_user -d idle_game"]
      interval: 5s
      timeout: 3s
      retries: 15
    restart: unless-stopped

volumes:
  postgres_data:
